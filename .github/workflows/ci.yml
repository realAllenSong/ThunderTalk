name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxdo-dev

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check thundertalk/

      - name: Format check
        run: uv run ruff format --check thundertalk/

      - name: Import check
        run: uv run python -c "import thundertalk; print(thundertalk.__version__)"
